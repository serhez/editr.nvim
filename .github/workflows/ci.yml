name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: rhysd/action-setup-vim@v1
        with:
          neovim: true
          version: stable
      - name: Headless load check
        run: |
          nvim --headless --cmd 'set shadafile=NONE' \
            -c "lua vim.opt.rtp:prepend(vim.fn.getcwd()); require('editr'); require('editr.router')" \
            -c qa
      - name: Helptags check
        run: |
          nvim --headless --cmd 'set shadafile=NONE' \
            -c "helptags doc" \
            -c qa
